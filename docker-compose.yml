services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-growth-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: digital_growth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_growth"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
