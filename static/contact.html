<!DOCTYPE html>
<html lang="en" class="ib-site">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Intasia Branding</title>
  <style>body{margin:0;background:#f9f4ee;color:#0a0a0a;font-family:system-ui,sans-serif}.ib-header{position:sticky;top:0;z-index:50;background:#f9f4ee;border-bottom:3px solid #0a0a0a}.ib-header-inner{display:flex;align-items:center;justify-content:space-between;max-width:72rem;margin:0 auto;padding:.75rem 1rem}.ib-logo{font-weight:800;text-decoration:none;color:inherit}</style>
  <link rel="preload" href="/css/main.css" as="style" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="modulepreload" href="/js/layout.js" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=Permanent+Marker&family=Space+Grotesk:wght@500;600;700&display=swap" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;800&family=Permanent+Marker&family=Space+Grotesk:wght@500;600;700&display=swap" /></noscript>
</head>
<body class="ib-site">
  <div id="site-header"><header class="ib-header"><div class="ib-header-inner"><a href="/" class="ib-logo">Intasia <span>Branding</span></a></div></header></div>
  <main class="min-h-screen ib-section--cream ib-grain ib-py" style="padding-top:6rem">
    <div class="ib-container">
      <div class="text-center ib-reveal mb-12">
        <h1 class="ib-display ib-page-title">Get in touch</h1>
        <p class="mt-4 text-lg text-[var(--ib-gray)] max-w-xl mx-auto">Send a message — we reply fast on email, WhatsApp, or Instagram.</p>
      </div>
      <div class="grid gap-12 lg:grid-cols-2">
        <form id="contact-form" class="ib-card p-8 ib-reveal">
          <p class="text-sm font-semibold text-[var(--ib-forest)] mb-4">✦ Real-time delivery to our team</p>
          <div class="space-y-4">
            <div><label class="ib-label" for="name">Your name *</label><input class="ib-input mt-1" id="name" name="name" required minlength="2" autocomplete="name" placeholder="John Doe" /></div>
            <div><label class="ib-label" for="email">Your email *</label><input class="ib-input mt-1" id="email" name="email" type="email" required autocomplete="email" placeholder="you@company.com" /></div>
            <div class="grid gap-4 sm:grid-cols-2">
              <div><label class="ib-label" for="phone">Phone / WhatsApp</label><input class="ib-input mt-1" id="phone" name="phone" type="tel" autocomplete="tel" placeholder="9342035536" /></div>
              <div><label class="ib-label" for="company">Company</label><input class="ib-input mt-1" id="company" name="company" autocomplete="organization" placeholder="Optional" /></div>
            </div>
            <div><label class="ib-label" for="service">What do you need?</label><input class="ib-input mt-1" id="service" name="service" placeholder="Branding, website, marketing…" /></div>
            <div><label class="ib-label" for="message">Message *</label><textarea class="ib-textarea mt-1" id="message" name="message" rows="5" required minlength="10" placeholder="Tell us about your project…"></textarea></div>
            <button type="submit" class="ib-btn ib-btn--lime w-full justify-center"><span class="ib-btn-label">Send message</span></button>
            <p id="contact-status" class="text-sm text-center min-h-[1.25rem]" role="status" aria-live="polite"></p>
          </div>
        </form>
        <div class="space-y-6 ib-reveal">
          <div class="ib-card p-6">
            <h3 class="font-bold text-lg">Reach us directly</h3>
            <p class="mt-1 text-sm text-[var(--ib-gray)]">Prefer chat? Tap a channel below.</p>
            <ul id="contact-details" class="mt-4 space-y-2 list-none p-0 m-0"></ul>
          </div>
          <div class="grid grid-cols-2 gap-3">
            <a href="https://wa.me/919342035536" target="_blank" rel="noopener noreferrer" class="ib-btn ib-btn--lime justify-center text-sm">WhatsApp</a>
            <a href="https://www.instagram.com/intasiabranding__/" target="_blank" rel="noopener noreferrer" class="ib-btn ib-btn--outline justify-center text-sm">Instagram</a>
          </div>
          <div class="ib-pinned-note">
            <p class="ib-hand text-lg">Typical reply</p>
            <p class="ib-display text-4xl mt-2">Fast</p>
            <p class="mt-2 text-sm opacity-80">intasiabranding@gmail.com</p>
          </div>
          <div id="contact-map" class="hidden rounded-xl overflow-hidden border-[3px] border-[var(--ib-ink)]"></div>
        </div>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/motion.js"></script>
  <script type="module" src="/js/contact.js"></script>
  <script type="module" src="/js/contact-details.js"></script>
</body>
</html>
